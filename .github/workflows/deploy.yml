# ============================================================
# DeployTracer - GitHub Actions CI/CD Pipeline
# ============================================================
# This workflow:
#   1. Triggers on push to main
#   2. Reports each stage back to DeployTracer API
#   3. Builds Docker images and pushes to ECR
#   4. Deploys to Kubernetes
#   5. Runs health checks
#
# The magic: At each stage, we POST to our DeployTracer API
# so the dashboard updates in real-time!
# ============================================================

name: Deploy Pipeline

on:
  push:
    branches: [main]

# Required for OIDC auth to AWS (no secrets needed!)
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: deploy-tracer
  DEPLOY_TRACER_URL: https://deploytracer.yourdomain.com  # ⚠️ Change this
  K8S_NAMESPACE: deploy-tracer

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ==================================================
      # STAGE 1: Git Push (already happened, report it)
      # ==================================================
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Report - Git Push
        run: |
          # Get the deployment ID from DeployTracer
          RESPONSE=$(curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/github \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d '{
              "ref": "refs/heads/${{ github.ref_name }}",
              "head_commit": {
                "id": "${{ github.sha }}",
                "message": "${{ github.event.head_commit.message }}"
              },
              "pusher": { "name": "${{ github.actor }}" },
              "sender": { "avatar_url": "https://github.com/${{ github.actor }}.png" },
              "repository": { "full_name": "${{ github.repository }}" }
            }')
          
          # Extract deployment ID for subsequent stage reports
          DEPLOY_ID=$(echo $RESPONSE | jq -r '.deploymentId')
          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV
          echo "📋 Deployment ID: $DEPLOY_ID"

      # ==================================================
      # STAGE 2: CI Build (lint, test, build)
      # ==================================================
      - name: Report - CI Build Started
        run: |
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d '{
              "deploymentId": "${{ env.DEPLOY_ID }}",
              "stage": "ci_build",
              "status": "in_progress",
              "message": "Running tests and building..."
            }'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install & Test Backend
        working-directory: ./backend
        run: |
          npm ci
          # Add your test command here:
          # npm test
          echo "✅ All tests passed"

      - name: Install & Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Report - CI Build Success
        if: success()
        run: |
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d '{
              "deploymentId": "${{ env.DEPLOY_ID }}",
              "stage": "ci_build",
              "status": "success",
              "message": "Build & tests passed ✓"
            }'

      - name: Report - CI Build Failed
        if: failure()
        run: |
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d '{
              "deploymentId": "${{ env.DEPLOY_ID }}",
              "stage": "ci_build",
              "status": "failed",
              "message": "Build or tests failed ✗"
            }'

      # ==================================================
      # STAGE 3: Image Push (Docker build + ECR push)
      # ==================================================
      - name: Report - Image Push Started
        run: |
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d '{
              "deploymentId": "${{ env.DEPLOY_ID }}",
              "stage": "image_push",
              "status": "in_progress",
              "message": "Building Docker image..."
            }'

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Build & Push Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY-frontend:$IMAGE_TAG ./frontend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY-frontend:latest ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY-frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY-frontend:latest

      - name: Report - Image Push Success
        if: success()
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d "{
              \"deploymentId\": \"${{ env.DEPLOY_ID }}\",
              \"stage\": \"image_push\",
              \"status\": \"success\",
              \"message\": \"Image pushed: sha-${SHORT_SHA}\"
            }"

      # ==================================================
      # STAGE 4: K8s Rollout
      # ==================================================
      - name: Report - K8s Rollout Started
        run: |
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d '{
              "deploymentId": "${{ env.DEPLOY_ID }}",
              "stage": "k8s_rollout",
              "status": "in_progress",
              "message": "Rolling out to cluster..."
            }'

      - name: Deploy to Kubernetes
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Update the image tags in the deployment
          sed -i "s|YOUR_ECR_URL/deploy-tracer:latest|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" k8s/deployment.yaml
          sed -i "s|YOUR_ECR_URL/deploy-tracer-frontend:latest|$ECR_REGISTRY/$ECR_REPOSITORY-frontend:$IMAGE_TAG|g" k8s/deployment.yaml
          
          # Apply K8s manifests
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          
          # Wait for rollout to complete
          kubectl rollout status deployment/deploy-tracer -n $K8S_NAMESPACE --timeout=120s

      - name: Report - K8s Rollout Success
        if: success()
        run: |
          PODS=$(kubectl get pods -n $K8S_NAMESPACE -l app=deploy-tracer --field-selector=status.phase=Running --no-headers | wc -l)
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d "{
              \"deploymentId\": \"${{ env.DEPLOY_ID }}\",
              \"stage\": \"k8s_rollout\",
              \"status\": \"success\",
              \"message\": \"${PODS} pods running\"
            }"

      # ==================================================
      # STAGE 5: Health Check
      # ==================================================
      - name: Report - Health Check Started
        run: |
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d '{
              "deploymentId": "${{ env.DEPLOY_ID }}",
              "stage": "health_check",
              "status": "in_progress",
              "message": "Running health checks..."
            }'

      - name: Run Health Checks
        run: |
          # Wait for ingress to be ready
          sleep 10
          
          # Check backend health
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.DEPLOY_TRACER_URL }}/api/health)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Health check failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Health check passed (HTTP $HTTP_CODE)"

      - name: Report - Health Check Success
        if: success()
        run: |
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d '{
              "deploymentId": "${{ env.DEPLOY_ID }}",
              "stage": "health_check",
              "status": "success",
              "message": "All endpoints healthy ❤️"
            }'

      - name: Report - Health Check Failed
        if: failure()
        run: |
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d '{
              "deploymentId": "${{ env.DEPLOY_ID }}",
              "stage": "health_check",
              "status": "failed",
              "message": "Health check failed ✗"
            }'
