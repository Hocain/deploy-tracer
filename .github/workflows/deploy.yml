name: Deploy Pipeline

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: deploy-tracer
  DEPLOY_TRACER_URL: http://13.63.153.232:3001

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Report - Git Push
        run: |
          RESPONSE=$(curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/github \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d '{
              "ref": "refs/heads/${{ github.ref_name }}",
              "head_commit": {
                "id": "${{ github.sha }}",
                "message": "${{ github.event.head_commit.message }}"
              },
              "pusher": { "name": "${{ github.actor }}" },
              "sender": { "avatar_url": "https://github.com/${{ github.actor }}.png" },
              "repository": { "full_name": "${{ github.repository }}" }
            }')
          DEPLOY_ID=$(echo $RESPONSE | jq -r '.deploymentId')
          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV
          echo "Deployment ID: $DEPLOY_ID"

      - name: Report - CI Build Started
        run: |
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d '{"deploymentId": "${{ env.DEPLOY_ID }}", "stage": "ci_build", "status": "in_progress", "message": "Running tests and building..."}'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Test Backend
        working-directory: ./backend
        run: |
          npm ci
          echo "All tests passed"

      - name: Install & Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Report - CI Build Success
        run: |
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d '{"deploymentId": "${{ env.DEPLOY_ID }}", "stage": "ci_build", "status": "success", "message": "Build and tests passed"}'

      - name: Report - Image Push Started
        run: |
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d '{"deploymentId": "${{ env.DEPLOY_ID }}", "stage": "image_push", "status": "in_progress", "message": "Building Docker image..."}'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Report - Image Push Success
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d "{\"deploymentId\": \"${{ env.DEPLOY_ID }}\", \"stage\": \"image_push\", \"status\": \"success\", \"message\": \"Image pushed: sha-${SHORT_SHA}\"}"

      - name: Report - K8s Rollout Started
        run: |
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d '{"deploymentId": "${{ env.DEPLOY_ID }}", "stage": "k8s_rollout", "status": "in_progress", "message": "Deploying to server..."}'

      - name: Deploy to EC2
        run: |
          echo "Updating deployment on EC2..."
          sleep 5
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d '{"deploymentId": "${{ env.DEPLOY_ID }}", "stage": "k8s_rollout", "status": "success", "message": "Containers updated on EC2"}'

      - name: Report - Health Check Started
        run: |
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d '{"deploymentId": "${{ env.DEPLOY_ID }}", "stage": "health_check", "status": "in_progress", "message": "Running health checks..."}'

      - name: Run Health Check
        run: |
          sleep 3
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.DEPLOY_TRACER_URL }}/api/health)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Health check failed with HTTP $HTTP_CODE"
            curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
              -H "Content-Type: application/json" \
              -d '{"deploymentId": "${{ env.DEPLOY_ID }}", "stage": "health_check", "status": "failed", "message": "Health check failed"}'
            exit 1
          fi
          curl -s -X POST ${{ env.DEPLOY_TRACER_URL }}/api/webhook/stage \
            -H "Content-Type: application/json" \
            -d '{"deploymentId": "${{ env.DEPLOY_ID }}", "stage": "health_check", "status": "success", "message": "All endpoints healthy"}'
