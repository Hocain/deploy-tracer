# ============================================================
# DeployTracer - Kubernetes Deployment
# ============================================================
# Deploys backend + frontend as a single pod
# (for simplicity in a weekend project)
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-tracer
  namespace: deploy-tracer
  labels:
    app: deploy-tracer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deploy-tracer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: deploy-tracer
    spec:
      containers:
        # Backend container
        - name: backend
          image: YOUR_ECR_URL/deploy-tracer:latest  # ⚠️ Replace with your ECR URL
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: deploy-tracer-secrets
                  key: github-webhook-secret
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"

        # Frontend container
        - name: frontend
          image: YOUR_ECR_URL/deploy-tracer-frontend:latest  # ⚠️ Replace
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
